set_pump_speed:
  name: Set pump speed
  description: Set the pump speed level (0=off, 1-3=speed levels).
  fields:
    speed:
      name: Speed
      description: Pump speed level (0=off, 1=low, 2=medium, 3=high).
      required: true
      selector:
        number:
          min: 0
          max: 3
          step: 1

toggle_pump:
  name: Toggle pump
  description: Toggle the pump on or off.

toggle_aux:
  name: Toggle auxiliary
  description: Toggle an auxiliary output on or off.
  fields:
    aux_id:
      name: Auxiliary ID
      description: The auxiliary output number to toggle (1-15).
      required: true
      selector:
        number:
          min: 1
          max: 15
          step: 1

set_valve_position:
  name: Set valve position
  description: Set the multiport valve to a specific position.
  fields:
    position:
      name: Position
      description: The valve position to set.
      required: true
      selector:
        select:
          options:
            - filter
            - waste
            - closed
            - backwash
            - bypass
            - rinse

clear_alarm:
  name: Clear alarm
  description: Clear all active PoolCop alarms.
